[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:server"

[deploy]
startCommand = "node server/dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Required environment variables on Railway:
# DATABASE_URL        — Neon PostgreSQL connection string (from neon.tech)
# NODE_ENV            — Set to "production"
# FRONTEND_URL        — Your Vercel frontend URL, e.g. https://proposalforge.vercel.app
#                       (Setting this skips static file serving — Vercel handles the frontend)
# FIREBASE_SERVICE_ACCOUNT_JSON — Firebase service account JSON (for auth token verification)
# GEMINI_API_KEY      — (Optional) Your own Gemini key, or use Replit AI Integrations env vars
# RESEND_API_KEY      — (Optional) For sending emails via Resend
# PUBLIC_URL          — Your Railway public URL, e.g. https://proposalforge-api.up.railway.app
#                       (Used for Stripe webhook registration and email links)
