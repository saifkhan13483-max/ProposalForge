services:
  - type: web
    name: proposalforge-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:server
    startCommand: node server/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
